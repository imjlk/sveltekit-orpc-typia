name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check:ci

      - name: Unit Tests
        run: >-
          bun test
          packages/auth-hasher-contracts/test/index.test.ts
          packages/auth-hasher-client/test/index.test.ts
          packages/api/src/lib/capabilities.test.ts
          packages/gateway/src/resolver.test.ts
          packages/shared/test/auth-bridge.test.ts
          apps/web/src/lib/server/auth-social.test.ts
          apps/web/src/lib/server/auth-password-hasher.test.ts
          apps/web/src/lib/server/auth-password-rehash.test.ts
          apps/auth-hasher-worker/src/fetch-handler.test.ts
          apps/auth-hasher-worker/src/kernel-node.test.ts
          apps/worker-edge-guard/src/policy.test.ts
          apps/worker-post-events/src/consumer.test.ts

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: E2E
        run: bun run test:e2e

  e2e-solo:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
          cache: true

      - name: Install
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: E2E Solo
        run: bun run --cwd apps/web test:e2e:solo

  auth-hasher:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Check Auth Hasher Worker
        run: cargo check --manifest-path apps/auth-hasher-worker/Cargo.toml --target wasm32-unknown-unknown
