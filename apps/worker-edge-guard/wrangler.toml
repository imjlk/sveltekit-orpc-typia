name = "cloudflare-first-starter-worker-edge-guard"
main = "src/index.ts"
compatibility_date = "2026-02-12"
compatibility_flags = ["nodejs_compat"]

[vars]
EDGE_GUARD_MODE = "ratelimit"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
persist = true

[observability.traces]
enabled = true
persist = true

[[ratelimits]]
name = "RATE_LIMITER"
namespace_id = "CHANGE_ME"
simple = { limit = 5, period = 60 }

[[durable_objects.bindings]]
name = "RATE_LIMITER_STATE"
class_name = "RateLimiterState"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RateLimiterState"]
