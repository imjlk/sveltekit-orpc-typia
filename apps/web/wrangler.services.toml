name = "cloudflare-first-starter-web"
compatibility_date = "2026-02-12"
compatibility_flags = ["nodejs_compat"]

pages_build_output_dir = ".svelte-kit/cloudflare"

[vars]
BETTER_AUTH_URL = "http://127.0.0.1:5173"
ORPC_IN_PROCESS = "1"

# Set BETTER_AUTH_SECRET as a Pages secret.

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
persist = true

[observability.traces]
enabled = true
persist = true

[[d1_databases]]
binding = "DB"
database_name = "CHANGE_ME"
database_id = "00000000-0000-0000-0000-000000000000"

[[services]]
binding = "AUTH_HASHER"
service = "cloudflare-first-starter-auth-hasher"

[[services]]
binding = "OG_WORKER"
service = "cloudflare-first-starter-worker-og"

[queues]
producers = [
  { binding = "POST_EVENTS", queue = "cloudflare-first-starter-post-events" }
]
