name = "cloudflare-first-starter-worker-meta"
main = "src/index.ts"
compatibility_date = "2026-02-14"
compatibility_flags = ["nodejs_compat"]

# Set BETTER_AUTH_SECRET as a Worker secret before deployment.

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
invocation_logs = true
persist = true

[observability.traces]
enabled = true
persist = true

[[d1_databases]]
binding = "DB"
# Fill these in after `wrangler d1 create ...`
database_name = "CHANGE_ME"
database_id = "00000000-0000-0000-0000-000000000000"
